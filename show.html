<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GitHub Issues 列表</title>
</head>
<body>
  <h2>GitHub Issues 列表</h2>
  <div id="issues"></div>

  <script>
    async function loadIssues() {
      try {
        const res = await fetch("https://api.github.com/repos/25eqsg3f08/Issues/issues");
        const issues = await res.json();
        const container = document.getElementById("issues");

        issues.forEach(issue => {
          const div = document.createElement("div");
          div.innerHTML = `
            <h3><a href="${issue.html_url}" target="_blank">${issue.title}</a></h3>
            <p>作者: ${issue.user.login}</p>
            <p>${issue.body ? issue.body.slice(0, 150) + "..." : "(無內容)"}</p>
            <hr>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        console.error("載入失敗:", err);
      }
    }
    loadIssues();
  </script>
</body>
</html>
